<div class="card">

    <h2>Select Address</h2>

    <div *ngFor="let addr of addresses"
         class="address-card"
         [class.selected]="selectedAddressId === addr.id">

        <div (click)="selectAddress(addr)">

            <strong>{{ addr.fullName }}</strong>

            <p>{{ addr.postalCode }}</p>

            <small>{{ addr.city }}</small>

        </div>

        <button
            class="edit-btn"
            type="button"
            (click)="editAddress(addr)">
            Edit
        </button>

    </div>

    <h3>

        {{ editing ? 'Edit Address' : 'Add New Address' }}

    </h3>

    <form [formGroup]="addressForm">

        <input
            placeholder="Full Name"
            formControlName="fullName">

        <input
            placeholder="Address"
            formControlName="address">

        <input
            placeholder="City"
            formControlName="city">

        <input
            placeholder="Postal Code"
            formControlName="postalCode">

        <button
            class="primary"
            type="button"
            (click)="addOrUpdateAddress()">

            {{ editing ? 'Update Address' : 'Add Address' }}

        </button>

        <button
            *ngIf="editing"
            class="secondary"
            type="button"
            (click)="cancelEdit()">

            Cancel

        </button>

    </form>

</div>
